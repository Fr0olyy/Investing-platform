<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Ключевые экраны пользовательского интерфейса инвестиционной платформы</title>
  <desc id="desc">Превью экранов: главный экран, каталог активов, форма сделки, ML-анализ и журнал API.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="0.5" stop-color="#111827"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
    <style>
      .title { fill: #f8fafc; font: 800 34px Inter, Arial, sans-serif; }
      .subtitle { fill: #94a3b8; font: 500 18px Inter, Arial, sans-serif; }
      .label { fill: #67e8f9; font: 800 13px Inter, Arial, sans-serif; letter-spacing: 1px; }
      .h2 { fill: #f8fafc; font: 800 24px Inter, Arial, sans-serif; }
      .h3 { fill: #f8fafc; font: 800 19px Inter, Arial, sans-serif; }
      .text { fill: #cbd5e1; font: 500 15px Inter, Arial, sans-serif; }
      .muted { fill: #94a3b8; font: 500 13px Inter, Arial, sans-serif; }
      .green { fill: #86efac; font: 800 16px Inter, Arial, sans-serif; }
      .red { fill: #fca5a5; font: 800 16px Inter, Arial, sans-serif; }
      .panel { fill: rgba(15, 23, 42, 0.85); stroke: rgba(148, 163, 184, 0.28); stroke-width: 1.2; }
      .soft { fill: rgba(148, 163, 184, 0.10); }
      .bar-bg { fill: rgba(148, 163, 184, 0.18); }
    </style>
  </defs>

  <rect width="1280" height="760" fill="url(#bg)"/>
  <circle cx="60" cy="60" r="280" fill="#38bdf8" opacity="0.12"/>
  <circle cx="1190" cy="720" r="310" fill="#22c55e" opacity="0.10"/>

  <text x="48" y="64" class="title">Реализация UI: ключевые экраны Investing Platform</text>
  <text x="48" y="96" class="subtitle">React/Vite интерфейс для демонстрации входа, портфеля, активов, сделки, AI-прогноза и журнала API</text>

  <rect x="48" y="132" width="370" height="250" rx="28" class="panel" filter="url(#shadow)"/>
  <text x="78" y="170" class="label">ГЛАВНЫЙ ЭКРАН</text>
  <text x="78" y="210" class="h2">Портфель: 1 000 840 ₽</text>
  <text x="78" y="240" class="muted">Баланс, стоимость активов, PnL и сценарий пользователя</text>
  <rect x="78" y="270" width="140" height="74" rx="16" class="soft"/>
  <text x="96" y="300" class="green">+840 ₽</text>
  <text x="96" y="326" class="muted">общий PnL</text>
  <rect x="234" y="270" width="140" height="74" rx="16" class="soft"/>
  <text x="252" y="300" class="text">15 678 ₽</text>
  <text x="252" y="326" class="muted">в активах</text>

  <rect x="454" y="132" width="370" height="250" rx="28" class="panel" filter="url(#shadow)"/>
  <text x="484" y="170" class="label">КАТАЛОГ АКТИВОВ</text>
  <text x="484" y="210" class="h2">SBER · GAZP · LKOH · YDEX</text>
  <text x="484" y="240" class="muted">Карточки с ценой, сектором и ML-прогнозом</text>
  <rect x="484" y="270" width="142" height="74" rx="16" class="soft"/>
  <text x="502" y="300" class="h3">SBER</text>
  <text x="502" y="326" class="green">+1.84%</text>
  <rect x="644" y="270" width="142" height="74" rx="16" class="soft"/>
  <text x="662" y="300" class="h3">GAZP</text>
  <text x="662" y="326" class="red">-0.42%</text>

  <rect x="860" y="132" width="370" height="250" rx="28" class="panel" filter="url(#shadow)"/>
  <text x="890" y="170" class="label">ФОРМА СДЕЛКИ</text>
  <text x="890" y="210" class="h2">Покупка / продажа актива</text>
  <text x="890" y="240" class="muted">Выбор тикера, количества и расчет суммы</text>
  <rect x="890" y="270" width="300" height="42" rx="14" class="soft"/>
  <text x="912" y="297" class="text">SBER · Sberbank</text>
  <rect x="890" y="326" width="140" height="42" rx="14" fill="#86efac"/>
  <text x="930" y="353" fill="#052e16" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800">Купить</text>
  <rect x="1050" y="326" width="140" height="42" rx="14" fill="rgba(248, 113, 113, 0.25)"/>
  <text x="1086" y="353" fill="#fecaca" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800">Продать</text>

  <rect x="48" y="430" width="574" height="250" rx="28" class="panel" filter="url(#shadow)"/>
  <text x="78" y="468" class="label">AI / ML-ПРОГНОЗ</text>
  <text x="78" y="508" class="h2">SBER: прогноз 326 400 ₽ · confidence 0.74</text>
  <text x="78" y="538" class="muted">Драйверы: IMOEX, USD/RUB, KEY_RATE, BRENT</text>
  <rect x="78" y="566" width="480" height="12" rx="6" class="bar-bg"/>
  <rect x="78" y="566" width="390" height="12" rx="6" fill="url(#accent)"/>
  <rect x="78" y="604" width="480" height="12" rx="6" class="bar-bg"/>
  <rect x="78" y="604" width="280" height="12" rx="6" fill="url(#accent)"/>
  <rect x="78" y="642" width="480" height="12" rx="6" class="bar-bg"/>
  <rect x="78" y="642" width="190" height="12" rx="6" fill="url(#accent)"/>

  <rect x="658" y="430" width="572" height="250" rx="28" class="panel" filter="url(#shadow)"/>
  <text x="688" y="468" class="label">ЖУРНАЛ API И СТАТУСЫ</text>
  <text x="688" y="508" class="h2">REST-запросы, ответы и ошибки</text>
  <text x="688" y="540" class="text">GET /api/v1/system/health</text>
  <text x="688" y="570" class="text">POST /api/v1/auth/register</text>
  <text x="688" y="600" class="text">POST /api/v1/trades/buy</text>
  <rect x="966" y="528" width="180" height="34" rx="17" fill="rgba(34, 197, 94, 0.18)"/>
  <text x="1008" y="550" class="green">200 OK</text>
  <rect x="966" y="576" width="180" height="34" rx="17" fill="rgba(245, 158, 11, 0.16)"/>
  <text x="1008" y="598" fill="#fde68a" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800">400 CHECK</text>
  <rect x="966" y="624" width="180" height="34" rx="17" fill="rgba(239, 68, 68, 0.16)"/>
  <text x="1008" y="646" class="red">401 TOKEN</text>
</svg>
